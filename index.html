<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google</title>
  </head>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: grid;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: "Product Sans", sans-serif;
    }
    h1 {
      font-size: 6rem;
      margin-bottom: 2.5rem;
      word-spacing: -5rem;
    }
    .blue {
      color: rgb(3, 3, 179);
    }
    .red {
      color: rgb(244, 5, 5);
    }
    .yellow {
      color: yellow;
    }
    .green {
      color: green;
    }
    .Search {
      box-shadow: 0 2px 13px rgba(0, 0, 0, 0.2);
      border-radius: 50px;
      padding: 0.7rem;
      display: flex;
      width: 50rem;
      align-items: center;
    }
    .Search img {
      margin-right: 0.7rem;
      margin-left: 0.5rem;
    }
    .Search input {
      margin-right: -2rem;
    }
    input:focus {
      border: none;
      outline: 0;
    }
    .shortcuts {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 3rem;
    }
    .shortcuts .gmail span {
      background-color: grey;
      padding: 1rem;
    }
    .gmail {
      margin-right: 3rem;
    }
    .gmail p {
      /* background-color: grey; */
      padding-top: 1rem;
    }
    .addShortcut p {
      padding-top: 1rem;
    }
    .shortcuts .cover {
      background-color: rgb(217, 215, 215);
      height: 3.5rem;
      width: 3.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50px;
    }
  </style>
  <body>
    <div class="container">
      <h1>
        <span class="blue">G</span>
        <span class="red">o</span>
        <span class="yellow">o</span>
        <span class="blue">g</span>
        <span class="green">l</span>
        <span class="red">e</span>
      </h1>

      <div class="Search">
        <img src="search.png" alt="" height="30" width="30" />
        <input
          type="text"
          name=""
          id=""
          placeholder="Search Google or type a URL"
          style="height: 2.5rem; width: 20rem; border: none"
        />
        <p
          style="
            margin-left: 55.5%;
            background-color: rgb(217, 215, 215);
            border-radius: 50px;
            padding: 0.7rem;
          "
        >
          AI Mode
        </p>
      </div>
      <div class="shortcuts">
        <div class="gmail">
          <div class="cover">
            <img src="google.png" alt="" height="30" width="30" />
          </div>
          <p>Gmail</p>
        </div>
        <div class="addShortcut">
          <div class="cover" style="margin-left: 1.5rem">
            <img src="plus.png" alt="" height="30" width="30" />
          </div>
          <p>Add Shortcut</p>
        </div>
      </div>
    </div>
  </body>
</html>
